<!--
  EASTEAM · Universal Email Header
  Width: 600px · Canvas: Warm Ivory (#F5F0EC)
  Paste this block at the top of every Klaviyo email.
  All styles are inline — Gmail safe.
-->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" align="center" style="width:600px; max-width:600px; background:#F5F0EC; margin:0 auto;">
  <tr>
    <td align="center" style="padding:44px 56px 0 56px;">
      <!-- Wordmark · EASTEAM -->
      <div style="font-family:'Staatliches', Impact, Arial Narrow, sans-serif; font-size:28px; line-height:1; letter-spacing:0; color:#0A0807; text-transform:uppercase;">
        EASTEAM
      </div>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:18px 56px 0 56px;">
      <!-- Tagline · MADE TO LOVE YOU -->
      <div style="font-family:'Roboto Mono', 'Courier New', monospace; font-size:10px; line-height:1; letter-spacing:2.6px; color:#D9A5AC; text-transform:uppercase;">
        MADE TO LOVE YOU
      </div>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:14px 0 0 0;">
      <!-- Pink dot · 5×5 -->
      <table role="presentation" width="5" height="5" cellpadding="0" cellspacing="0" border="0" style="background:#D9A5AC; line-height:5px; font-size:5px;">
        <tr><td style="height:5px; width:5px; line-height:5px; font-size:0;">&nbsp;</td></tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding:13px 56px 0 56px;">
      <!-- Hairline divider · 1px -->
      <div style="height:1px; line-height:1px; font-size:0; background:rgba(10,8,7,0.14); border-top:1px solid rgba(10,8,7,0.14);">&nbsp;</div>
    </td>
  </tr>
  <tr><td style="height:10px; line-height:10px; font-size:0;">&nbsp;</td></tr>
</table>
